name: Problem Project
on: 
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Dependency installation
        run: npm install
      - name: Run tests
        run: npm test
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Dependency installation
        run: npm install
      - name: Run linter
        run: npm run lint
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Dependency installation
        run: npm install
      - name: Build project
        run: npm run build
      - name: Deploy to server
        run: echo "Deploying to server..." 